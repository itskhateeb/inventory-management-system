services:
  postgres:
    image: postgres:15-alpine
    container_name: inventory_postgres_prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: inventory_db
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inventory_network_prod
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: inventory_backend_prod
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/inventory_db
      APP_NAME: Inventory Management System
      DEBUG: "False"
      API_V1_PREFIX: /api/v1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - inventory_network_prod
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: inventory_frontend_prod
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - inventory_network_prod
    restart: unless-stopped

networks:
  inventory_network_prod:
    driver: bridge

volumes:
  postgres_data_prod: